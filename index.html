<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャリア診断チャットボット</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }

/* ===== Floating Button ===== */
.chatbot-toggle {
  position: fixed; bottom: 24px; right: 24px;
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
  z-index: 9999; display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s;
}
.chatbot-toggle:hover { transform: scale(1.08); }
.chatbot-toggle svg { width: 32px; height: 32px; fill: #fff; }
.chatbot-toggle.active { display: none; }

/* ===== Chat Window ===== */
.chatbot-window {
  position: fixed; bottom: 24px; right: 24px;
  width: 400px; max-width: calc(100vw - 32px);
  height: 600px; max-height: calc(100vh - 48px);
  background: #fff; border-radius: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  display: none; flex-direction: column;
  z-index: 10000; overflow: hidden;
}
.chatbot-window.open { display: flex; }

/* Header */
.chatbot-header {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff; padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.chatbot-header-title { font-size: 15px; font-weight: 700; }
.chatbot-header-sub { font-size: 11px; opacity: 0.85; margin-top: 2px; }
.chatbot-close {
  background: none; border: none; color: #fff;
  font-size: 24px; cursor: pointer; line-height: 1;
}

/* Messages Area */
.chatbot-messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  background: #f5f3ff;
}
.chatbot-messages::-webkit-scrollbar { width: 4px; }
.chatbot-messages::-webkit-scrollbar-thumb { background: #c4b5fd; border-radius: 2px; }

/* Message Bubbles */
.msg { max-width: 85%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg-bot {
  align-self: flex-start;
  background: #fff; color: #1e1b4b;
  padding: 12px 16px; border-radius: 4px 16px 16px 16px;
  font-size: 14px; line-height: 1.7;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  white-space: pre-line;
}
.msg-user {
  align-self: flex-end;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff; padding: 10px 16px;
  border-radius: 16px 4px 16px 16px;
  font-size: 14px; line-height: 1.6;
}

/* Choice Buttons */
.choices {
  align-self: flex-start;
  display: flex; flex-wrap: wrap; gap: 8px;
  max-width: 90%; animation: fadeIn 0.3s ease;
}
.choice-btn {
  background: #fff; color: #4f46e5;
  border: 1.5px solid #4f46e5;
  padding: 8px 16px; border-radius: 20px;
  font-size: 13px; cursor: pointer;
  transition: all 0.15s; font-weight: 500;
}
.choice-btn:hover {
  background: #4f46e5; color: #fff;
}

/* ===== Job Cards ===== */
.job-cards-container {
  align-self: stretch;
  display: flex; flex-direction: column; gap: 12px;
  animation: fadeIn 0.4s ease;
}
.job-card {
  background: #fff; border-radius: 14px;
  padding: 16px; border-left: 4px solid #4f46e5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.job-card-title {
  font-size: 15px; font-weight: 700; color: #1e1b4b;
  margin-bottom: 4px;
}
.job-card-company {
  font-size: 12px; color: #6b7280; margin-bottom: 10px;
}
.job-card-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.job-card-tag {
  background: #ede9fe; color: #4f46e5;
  padding: 3px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 500;
}
.job-card-salary {
  margin-top: 8px; font-size: 14px; font-weight: 700; color: #7c3aed;
}

/* ===== Inline Form ===== */
.chatbot-form {
  align-self: stretch;
  background: #fff; border-radius: 14px;
  padding: 20px; animation: fadeIn 0.3s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07);
}
.chatbot-form h3 {
  font-size: 15px; font-weight: 700; color: #1e1b4b;
  margin-bottom: 14px;
}
.form-group { margin-bottom: 12px; }
.form-group label {
  display: block; font-size: 12px; font-weight: 600;
  color: #374151; margin-bottom: 4px;
}
.form-group label .required {
  color: #ef4444; margin-left: 4px; font-size: 11px;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid #d1d5db; border-radius: 10px;
  font-size: 14px; font-family: inherit;
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none; border-color: #4f46e5;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-submit {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  color: #fff; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s;
  margin-top: 4px;
}
.form-submit:hover { opacity: 0.9; }
.form-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== Typing Indicator ===== */
.typing { align-self: flex-start; display: flex; gap: 4px; padding: 12px 16px; }
.typing span {
  width: 8px; height: 8px; background: #a78bfa;
  border-radius: 50%; animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .chatbot-window { bottom: 0; right: 0; width: 100%; height: 100%; max-height: 100vh; border-radius: 0; }
  .chatbot-toggle { bottom: 16px; right: 16px; width: 56px; height: 56px; }
}
</style>

    id: "step3",
    bot: "現在の年収帯を教えてください💰\n※おおよそで大丈夫です！",
    choices: ["年収300万円未満", "年収300〜450万円", "年収450〜600万円", "年収600万円以上"]
  },
  {
    id: "step4",
    bot: "何ヶ月以内に転職したいですか？📅",
    choices: ["すぐにでも！", "3ヶ月以内", "半年以内", "まだ考えてない"]
  },
  {
    id: "step5",
    bot: "年収の他に、転職で最も叶えたいことを一つ教えてください！🎯",
    choices: ["残業を減らしたい", "リモート・在宅で働きたい", "やりがい・成長できる環境に移りたい", "大手・安定した企業に転職したい", "営業以外の職種に挑戦したい"]
  }
];

// ===== App State =====
let currentStepIndex = 0;
let answers = {};

// ===== DOM Elements =====
const toggleBtn = document.getElementById("chatbotToggle");
const chatWindow = document.getElementById("chatbotWindow");
const closeBtn = document.getElementById("chatbotClose");
const messagesEl = document.getElementById("chatbotMessages");

// ===== Open / Close =====
toggleBtn.addEventListener("click", () => {
  chatWindow.classList.add("open");
  toggleBtn.classList.add("active");
  if (messagesEl.children.length === 0) startChat();
});
closeBtn.addEventListener("click", () => {
  chatWindow.classList.remove("open");
  toggleBtn.classList.remove("active");
});

// ===== Chat Logic =====
function scrollToBottom() {
  requestAnimationFrame(() => { messagesEl.scrollTop = messagesEl.scrollHeight; });
}

function addBotMessage(text) {
  const div = document.createElement("div");
  div.className = "msg msg-bot";
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function addUserMessage(text) {
  const div = document.createElement("div");
  div.className = "msg msg-user";
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "typing";
  div.id = "typingIndicator";
  div.innerHTML = "<span></span><span></span><span></span>";
  messagesEl.appendChild(div);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById("typingIndicator");
  if (el) el.remove();
}

function addChoices(choices, onSelect) {
  const container = document.createElement("div");
  container.className = "choices";
  choices.forEach(text => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = text;
    btn.addEventListener("click", () => {
      container.remove();
      onSelect(text);
    });
    container.appendChild(btn);
  });
  messagesEl.appendChild(container);
  scrollToBottom();
}

function showJobCards(salaryChoice, purposeChoice) {
  const key = getSalaryKey(salaryChoice);
  const cards = JOB_CARDS[key][purposeChoice];

  showTyping();
  setTimeout(() => {
    hideTyping();
    addBotMessage("あなたの回答をもとに、内定の可能性が高い求人を3件ピックアップしました！🎉");

    setTimeout(() => {
      const container = document.createElement("div");
      container.className = "job-cards-container";
      cards.forEach(card => {
        const el = document.createElement("div");
        el.className = "job-card";
        el.innerHTML = `
          <div class="job-card-title">${card.title}</div>
          <div class="job-card-company">${card.company}</div>
          <div class="job-card-salary">${card.salary}</div>
          <div class="job-card-tags">
            ${card.tags.map(t => `<span class="job-card-tag">${t}</span>`).join("")}
          </div>
        `;
        container.appendChild(el);
      });
      messagesEl.appendChild(container);
      scrollToBottom();

      setTimeout(() => {
        addBotMessage("気になる求人はありましたか？\n\nより詳しい求人情報や、あなたに合った非公開求人をご紹介するために、簡単な情報をご入力ください📝\n\n✅ 完全無料\n✅ しつこい連絡は一切しません");
        setTimeout(() => showForm(), 500);
      }, 800);
    }, 400);
  }, 1000);
}

function showForm() {
  const container = document.createElement("div");
  container.className = "chatbot-form";
  container.innerHTML = `
    <h3>無料キャリア相談に申し込む</h3>
    <div class="form-group">
      <label>お名前<span class="required">*必須</span></label>
      <input type="text" id="formName" placeholder="山田 太郎">
    </div>
    <div class="form-group">
      <label>メールアドレス<span class="required">*必須</span></label>
      <input type="email" id="formEmail" placeholder="example@email.com">
    </div>
    <div class="form-group">
      <label>電話番号<span class="required">*必須</span></label>
      <input type="tel" id="formPhone" placeholder="090-1234-5678">
    </div>
    <div class="form-group">
      <label>ご要望・お悩みなど（任意）</label>
      <textarea id="formNote" placeholder="気になる業界や働き方など、何でもお気軽にどうぞ"></textarea>
    </div>
    <button class="form-submit" id="formSubmit">無料で相談する</button>
  `;
  messagesEl.appendChild(container);
  scrollToBottom();

  document.getElementById("formSubmit").addEventListener("click", handleFormSubmit);
}

function handleFormSubmit() {
  const name = document.getElementById("formName").value.trim();
  const email = document.getElementById("formEmail").value.trim();
  const phone = document.getElementById("formPhone").value.trim();
  const note = document.getElementById("formNote").value.trim();

  if (!name || !email || !phone) {
    alert("お名前・メールアドレス・電話番号は必須です。");
    return;
  }

  const submitBtn = document.getElementById("formSubmit");
  submitBtn.disabled = true;
  submitBtn.textContent = "送信中...";

  // Collect all data
  const formData = { ...answers, name, email, phone, note };
  console.log("送信データ:", formData);

  setTimeout(() => {
    submitBtn.textContent = "送信完了！";

    setTimeout(() => {
      addBotMessage("お申し込みありがとうございます！🎉\n\n担当のキャリアアドバイザーから、1〜3営業日以内にご連絡いたします。\n\nあなたにぴったりの求人を一緒に見つけましょう！💪");
    }, 300);
  }, 800);
}

// ===== Step Execution =====
function runStep(index) {
  const step = STEPS[index];
  if (!step) return;

  showTyping();
  setTimeout(() => {
    hideTyping();
    addBotMessage(step.bot);

    setTimeout(() => {
      addChoices(step.choices, (selected) => {
        addUserMessage(selected);
        answers[step.id] = selected;

        // Handle branching at step0
        if (step.id === "step0" && selected === "どんなことができるの？") {
          currentStepIndex = 1; // step0_info
          setTimeout(() => runStep(currentStepIndex), 400);
          return;
        }

        // After step0_info, go to step1 (index 2)
        if (step.id === "step0_info") {
          currentStepIndex = 2;
          setTimeout(() => runStep(currentStepIndex), 400);
          return;
        }

        // After step5, show job cards
        if (step.id === "step5") {
          showJobCards(answers["step3"], selected);
          return;
        }

        // Normal flow: next step
        currentStepIndex++;
        // Skip step0_info in normal flow
        if (STEPS[currentStepIndex]?.id === "step0_info") currentStepIndex++;
        setTimeout(() => runStep(currentStepIndex), 400);
      });
    }, 300);
  }, 600);
}

function startChat() {
  currentStepIndex = 0;
  answers = {};
  runStep(0);
}
</script>
</body>
</html>
